<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邀请评价</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100">
    <nav class="bg-white shadow-lg mb-8">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center py-4">
                <a href="/" class="text-blue-600 hover:text-blue-800">
                    <i class="fas fa-arrow-left"></i> 返回
                </a>
                <h1 class="text-2xl font-bold text-gray-800">邀请评价</h1>
                <div></div>
            </div>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto px-4">
        <div class="bg-white rounded-lg shadow-md p-8">
            <form id="inviteForm" class="space-y-6">
                <div>
                    <label class="block text-gray-700 mb-2">选择人员 *</label>
                    <select id="memberId" required class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">请选择</option>
                        {% for member in members %}
                        <option value="{{ member.id }}">{{ member.name }} - {{ member.department or '未分配' }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label class="block text-gray-700 mb-2">被邀请人姓名</label>
                    <input type="text" id="inviteeName" class="w-full border rounded-lg px-4 py-2" placeholder="例如：张三">
                </div>

                <div>
                    <label class="block text-gray-700 mb-2">被邀请人邮箱/钉钉 *</label>
                    <input type="text" id="inviteeEmail" required class="w-full border rounded-lg px-4 py-2" placeholder="例如：zhangsan@company.com">
                </div>

                <div>
                    <label class="block text-gray-700 mb-2">邀请留言</label>
                    <textarea id="message" rows="4" class="w-full border rounded-lg px-4 py-2" placeholder="请对 XXX 进行评价..."></textarea>
                </div>

                <div class="bg-blue-50 p-4 rounded-lg">
                    <h4 class="font-semibold text-blue-800 mb-2">
                        <i class="fas fa-info-circle"></i> 邀请说明
                    </h4>
                    <ul class="text-sm text-blue-700 space-y-1">
                        <li>• 邀请链接将通过邮件/钉钉发送</li>
                        <li>• 邀请有效期 7 天</li>
                        <li>• 被邀请人可以评价指定人员</li>
                        <li>• 评价完成后你会收到通知</li>
                    </ul>
                </div>

                <button type="submit" class="w-full bg-green-600 text-white py-4 rounded-lg hover:bg-green-700 text-lg font-bold">
                    <i class="fas fa-paper-plane"></i> 发送邀请
                </button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('inviteForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const memberId = document.getElementById('memberId').value;
            const memberSelect = document.getElementById('memberId');
            const memberName = memberSelect.options[memberSelect.selectedIndex].text;

            const data = {
                member_id: memberId,
                member_name: memberName.split(' - ')[0],
                invitee_name: document.getElementById('inviteeName').value,
                invitee_email: document.getElementById('inviteeEmail').value,
                message: document.getElementById('message').value
            };

            const res = await fetch('/invite', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            if (res.ok) {
                alert('邀请已发送！');
                window.location.href = '/invitations';
            } else {
                alert('发送失败');
            }
        });
    </script>
</body>
</html>
