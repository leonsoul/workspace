<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WebSocket 测试</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .connected { background: #d4edda; color: #155724; }
        .disconnected { background: #f8d7da; color: #721c24; }
        .message { padding: 8px; margin: 5px 0; background: #f1f1f1; border-radius: 3px; }
        #log { max-height: 400px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; }
    </style>
</head>
<body>
    <h1>🦞 人员评价系统 - WebSocket 实时通知测试</h1>
    
    <div id="status" class="status disconnected">
        🔴 未连接
    </div>
    
    <button onclick="connect()">连接</button>
    <button onclick="disconnect()">断开</button>
    <button onclick="requestUpdate()">请求数据更新</button>
    
    <h3>消息日志</h3>
    <div id="log"></div>
    
    <h3>当前数据</h3>
    <pre id="data">点击"请求数据更新"获取数据</pre>
    
    <script>
        let socket = null;
        
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            logDiv.innerHTML += `<div class="message">[${time}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        function updateStatus(connected) {
            const statusDiv = document.getElementById('status');
            if (connected) {
                statusDiv.className = 'status connected';
                statusDiv.innerHTML = '🟢 已连接';
            } else {
                statusDiv.className = 'status disconnected';
                statusDiv.innerHTML = '🔴 未连接';
            }
        }
        
        function connect() {
            if (socket) {
                log('已经连接', 'warn');
                return;
            }
            
            socket = io('http://localhost:5000');
            
            socket.on('connect', () => {
                log('✅ 连接到服务器', 'success');
                updateStatus(true);
            });
            
            socket.on('disconnect', () => {
                log('❌ 与服务器断开连接', 'error');
                updateStatus(false);
            });
            
            socket.on('server_message', (data) => {
                log(`📨 服务器消息：${data.data}`);
            });
            
            socket.on('update', (data) => {
                log(`🔄 数据更新：${data.event}`, 'success');
                console.log('Update:', data);
            });
            
            socket.on('data_update', (data) => {
                log(`📊 收到数据：${data.members.length} 个人员，${data.recent_reviews.length} 条评价`, 'success');
                document.getElementById('data').textContent = JSON.stringify(data, null, 2);
            });
            
            socket.on('connect_error', (error) => {
                log(`❌ 连接错误：${error.message}`, 'error');
            });
        }
        
        function disconnect() {
            if (socket) {
                socket.disconnect();
                socket = null;
                log('已断开连接');
                updateStatus(false);
            }
        }
        
        function requestUpdate() {
            if (!socket || !socket.connected) {
                log('请先连接', 'warn');
                return;
            }
            socket.emit('request_update');
            log('📤 发送数据更新请求');
        }
        
        // 自动连接
        window.onload = () => {
            connect();
        };
    </script>
</body>
</html>
